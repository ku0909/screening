name: Run Stock Screener

on:
  workflow_dispatch:
  schedule:
    # 日本時間 7:00 = UTC 22:00
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements_yfinance_screener.txt

      - name: Run screener
        run: |
          python yfinance_screener_fixed5_reason.py

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add result.html result.xlsx
          git commit -m "Update screening result" || echo "No changes"
          git push
