name: Run Stock Screener

on:
  schedule:
    # 日本時間 10:47 = UTC 01:47
    - cron: "47 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements_yfinance_screener.txt

      - name: Run screener
        run: |
          python yfinance_screener_prime_plus_sample_registered_v3.py

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add result.html result.xlsx
          git commit -m "Update screening result" || echo "No changes"
          git push
